plugins {
    id "com.android.application"
    id "kotlin-android"
    // Flutter Gradle Plugin must be applied after the Android and Kotlin plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // Firebase: enable once `google-services.json` is in `android/app/`.
    // The plugin call is wrapped in `apply` at the bottom of this file so it
    // doesn't fail the build before the file is dropped in.
}

android {
    namespace = "app.nocturne.nocturne"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "app.nocturne.nocturne"
        // 21 is required by firebase_auth + just_audio + audio_service.
        minSdk = 21
        targetSdk = 34
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Enable multidex for the Firebase + audio_service plugin set.
        multiDexEnabled = true
    }

    buildTypes {
        release {
            // Sign with debug keys so `flutter build apk --release` works
            // out of the box. Replace with your own signing config before
            // publishing to the Play Store.
            signingConfig = signingConfigs.debug

            // Trim resources + obfuscate code to keep the release APK
            // small. Flutter ships a default `proguard-rules.pro` so we
            // just point at it.
            minifyEnabled = true
            shrinkResources = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    packagingOptions {
        resources {
            excludes += [
                'META-INF/*.kotlin_module',
                'META-INF/AL2.0',
                'META-INF/LGPL2.1',
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/NOTICE',
                'META-INF/NOTICE.txt',
            ]
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Multidex runtime for older Android versions.
    implementation 'androidx.multidex:multidex:2.0.1'
}

// Apply the Google Services plugin only if `google-services.json` is present.
// This lets the project build before the developer has set up Firebase, and
// activates Firebase automatically once the config file is dropped in.
if (file('google-services.json').exists()) {
    apply plugin: 'com.google.gms.google-services'
}
